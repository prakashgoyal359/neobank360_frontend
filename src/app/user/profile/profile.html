<div class="p-6 text-white">
  <h2 class="text-xl font-bold mb-4">My Profile</h2>

  <p><b>Name:</b> {{ user.fullName }}</p>
  <p><b>Email:</b> {{ user.email }}</p>
  <p><b>Role:</b> {{ role }}</p>

  <!-- Admin Controls -->
  <div *ngIf="role === 'ADMIN'" class="mt-4 p-4 bg-red-500 rounded">
    <h3>Admin Panel</h3>
    <button class="bg-black px-3 py-1 mt-2">Manage Users</button>
  </div>
</div>
