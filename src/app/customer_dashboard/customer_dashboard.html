<div class="min-h-screen bg-[#0f172a] text-white p-4 md:p-6">
  <!-- Top Bar -->
  <div class="flex justify-between items-center mb-6">
    <h1 class="text-xl md:text-2xl font-bold">Dashboard</h1>

    <div class="flex items-center gap-4">
      <span class="hidden md:block">Hello, {{ userName }}</span>

      <button (click)="toggleTheme()" class="px-3 py-1 rounded bg-gray-800 hover:bg-gray-700">
        Theme
      </button>
    </div>
  </div>

  <!-- Main Grid -->
  <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
    <!-- LEFT SIDE -->
    <div class="lg:col-span-2 space-y-6">
      <!-- Balance Card -->
      <div class="rounded-xl p-6 bg-linear-to-r from-blue-600 to-indigo-700 shadow-lg">
        <p class="text-sm opacity-80">Total Balance</p>
        <h2 class="text-2xl md:text-3xl font-bold mt-2">₹{{ balance }}</h2>
        <p class="text-sm mt-2 opacity-70">Savings Account</p>
      </div>

      <!-- Transactions -->
      <div class="bg-[#1e293b] rounded-xl p-4 md:p-6 shadow">
        <div class="flex justify-between mb-4">
          <h2 class="text-lg font-semibold">Transactions</h2>
        </div>

        <div class="space-y-3">
          <div
            *ngFor="let t of transactions"
            class="flex justify-between items-center p-3 rounded-lg bg-[#334155]"
          >
            <div>
              <p class="font-medium">{{ t.name }}</p>
              <p class="text-sm text-gray-400">{{ t.date }}</p>
            </div>

            <p [ngClass]="t.amount > 0 ? 'text-green-400' : 'text-red-400'" class="font-semibold">
              {{ t.amount > 0 ? '+' : '' }}₹{{ t.amount }}
            </p>
          </div>
        </div>
      </div>
    </div>

    <!-- RIGHT SIDE -->
    <div class="space-y-6">
      <!-- Profile Card -->
      <div class="bg-[#1e293b] rounded-xl p-6 text-center shadow">
        <img src="https://i.pravatar.cc/80" class="mx-auto rounded-full mb-3" />
        <h3 class="font-semibold">{{ userName }}</h3>
        <p class="text-sm text-gray-400">Customer</p>
      </div>

      <!-- Activity (Simple Chart Placeholder) -->
      <div class="bg-[#1e293b] rounded-xl p-6 shadow">
        <h3 class="font-semibold mb-4">Activity</h3>

        <div class="h-40 flex items-center justify-center text-gray-400">Chart Coming Soon 📊</div>
      </div>
    </div>
  </div>
</div>
