<div class="min-h-screen flex items-center justify-center bg-white dark:bg-gray-900 transition">
  <!-- Toggle -->
  <button
    (click)="toggleTheme()"
    class="fixed top-4 right-4 px-3 py-1 rounded bg-gray-800 text-white dark:bg-white dark:text-black"
  >
    Toggle Theme
  </button>

  <!-- Card -->
  <div class="w-full max-w-md p-6 rounded-xl shadow-lg bg-white dark:bg-gray-800">
    <h2 class="text-2xl font-bold text-center text-gray-800 dark:text-white">Sign In</h2>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-4 mt-4">
      <!-- Email -->
      <input
        type="email"
        placeholder="Email"
        formControlName="email"
        class="w-full px-4 py-2 rounded-md border bg-gray-100 dark:bg-gray-700 dark:text-white"
      />

      <!-- Email Errors -->
      <p
        *ngIf="loginForm.get('email')?.touched && loginForm.get('email')?.errors?.['required']"
        class="text-red-500 text-sm"
      >
        Email is required
      </p>

      <p
        *ngIf="loginForm.get('email')?.touched && loginForm.get('email')?.errors?.['email']"
        class="text-red-500 text-sm"
      >
        Enter a valid email
      </p>

      <!-- Password -->
      <div class="relative">
        <input
          [type]="showPassword ? 'text' : 'password'"
          placeholder="Password"
          formControlName="password"
          class="w-full px-4 py-2 rounded-md border bg-gray-100 dark:bg-gray-700 dark:text-white"
        />

        <span (click)="showPassword = !showPassword" class="absolute right-3 top-2 cursor-pointer"
          >👁️</span
        >
        <!-- Password Error -->
        <p
          *ngIf="
            loginForm.get('password')?.touched && loginForm.get('password')?.errors?.['required']
          "
          class="text-red-500 text-sm"
        >
          Password is required
        </p>
      </div>

      <!-- Error -->
      <p *ngIf="errorMessage" class="text-red-500 text-sm text-center">
        {{ errorMessage }}
      </p>

      <!-- Button -->
      <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-2 rounded-md">
        Sign In
      </button>
    </form>

    <p class="text-center text-sm mt-4 text-gray-500 dark:text-gray-400">
      Don’t have an account?
      <a routerLink="/register" class="text-blue-500">Sign Up</a>
    </p>
  </div>
</div>
