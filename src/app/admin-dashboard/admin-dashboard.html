<div class="min-h-screen bg-[#0f172a] text-white p-6">
  <h1 class="text-2xl font-bold mb-4">Admin Dashboard</h1>

  <!-- Admin Controls -->
  <div class="bg-red-600 p-6 rounded-xl mb-6">
    <h2 class="text-lg font-semibold">Admin Controls</h2>

    <button (click)="toggleDropdown()" class="bg-black px-4 py-2 mt-3 rounded">Manage Users</button>

    <!-- Dropdown -->
    <div *ngIf="showDropdown" class="mt-4 bg-white text-black rounded p-3">
      <div
        *ngFor="let user of users"
        (click)="selectUser(user)"
        class="p-2 hover:bg-gray-200 cursor-pointer rounded"
      >
        {{ user.email }}
      </div>
    </div>
  </div>

  <!-- Selected User Form -->
  <div *ngIf="selectedUser" class="bg-[#1e293b] p-6 rounded-xl mb-6">
    <h2 class="text-lg mb-4">Update User</h2>

    <input
      [(ngModel)]="selectedUser.fullName"
      placeholder="Full Name"
      class="w-full p-2 mb-3 text-black rounded"
    />

    <input
      [(ngModel)]="selectedUser.email"
      placeholder="Email"
      class="w-full p-2 mb-3 text-black rounded"
    />

    <select [(ngModel)]="selectedUser.role" class="w-full p-2 mb-3 text-black rounded">
      <option value="ADMIN">ADMIN</option>
      <option value="CUSTOMER">CUSTOMER</option>
    </select>

    <button (click)="updateUser()" class="bg-blue-500 px-4 py-2 rounded">Update User</button>
  </div>

  <!-- Users List -->
  <div class="bg-[#1e293b] p-6 rounded-xl">
    <h2 class="text-lg mb-4">All Users</h2>

    <div *ngFor="let user of users" class="p-3 bg-[#334155] rounded mb-2">
      {{ user.email }}
    </div>
  </div>
</div>
