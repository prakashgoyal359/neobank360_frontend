<div class="min-h-screen bg-gradient-to-br from-[#0f172a] via-[#1e293b] to-[#064e3b] text-white">
  <!-- Navbar -->
  <div
    class="flex justify-between items-center px-8 py-4 bg-white/5 backdrop-blur-md border-b border-white/10"
  >
    <h1 class="text-2xl font-bold text-green-400">NeoBank360</h1>

    <div class="space-x-4">
      <button (click)="openLogin()" class="btn-outline">Login</button>
      <button (click)="openRegister()" class="btn-gradient">Open Account</button>
    </div>
  </div>

  <!-- Hero -->
  <div class="flex flex-col items-center justify-center text-center px-6 py-20">
    <h2 class="text-5xl font-bold mb-4">
      Smart Banking <br />
      <span class="text-green-400">Made Simple 💳</span>
    </h2>

    <p class="text-gray-300 max-w-xl mb-8">Manage your finances securely with NeoBank360.</p>

    <div class="space-x-4">
      <button (click)="openRegister()" class="btn-gradient">Get Started</button>

      <button (click)="openLogin()" class="btn-outline">Login</button>
    </div>
  </div>

  <!-- ✅ REGISTER MODAL -->
  <app-register *ngIf="showRegister" (close)="closeAll()" class="fixed inset-0 z-50"></app-register>

  <!-- ✅ LOGIN MODAL -->
  <app-login *ngIf="showLogin" (close)="closeAll()" class="fixed inset-0 z-50"></app-login>
</div>
