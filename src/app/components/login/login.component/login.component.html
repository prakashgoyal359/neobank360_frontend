<div
  class="min-h-screen flex items-center justify-center bg-gradient-to-br from-[#0f172a] via-[#1e293b] to-[#064e3b]"
>
  <div class="glass-card w-96">
    <h1 class="text-3xl font-bold text-center text-green-400 mb-2">NeoBank360</h1>

    <p class="text-center text-gray-400 mb-6">Secure Login</p>

    <h2 class="text-center text-xl mb-6 text-green-400">Login</h2>

    <input [(ngModel)]="username" class="input-dark" placeholder="Username" />
    <input [(ngModel)]="password" type="password" class="input-dark" placeholder="Password" />

    <button (click)="login()" class="btn-gradient w-full mt-4">Login</button>

    <button (click)="close.emit()" class="text-gray-400 text-sm mt-4 w-full">Cancel</button>
  </div>
</div>
