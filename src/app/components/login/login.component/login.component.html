<div class="fixed inset-0 bg-black bg-opacity-80 flex justify-center items-center">
  <div class="w-125 border border-gray-600 rounded-xl p-8 text-white relative">
    <button class="absolute top-3 right-3" (click)="close.emit()">✖</button>

    <h2 class="text-center text-xl mb-6 text-green-400">Login</h2>

    <input [(ngModel)]="username" class="input" placeholder="Username" />
    <input [(ngModel)]="password" type="password" class="input" placeholder="Password" />

    <button (click)="login()" class="btn w-full mt-4">Submit</button>
  </div>
</div>
